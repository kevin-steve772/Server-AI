name: Server-AI
version: 1.0.0
main: com.serverai.Main
api-version: 1.21
folia-supported: true

commands:
  ask:
    description: 询问AI问题
    usage: /ask <问题>
    aliases: [ai, 问]
    permission: serverai.ask

permissions:
  serverai.ask:
    description: 允许使用/ask命令
    default: true
  serverai.reload:
    description: 允许重载配置
    default: op
