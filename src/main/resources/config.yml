# AI API 配置
api:
  key: "your-api-key-here"
  endpoint: "https://api.openai.com/v1"
  model: "gpt-3.5-turbo"
  max-tokens: 1024
  temperature: 0.7
  timeout: 30

# NPC 配置 (使用流浪商人作为NPC形象)
npc:
  name: "&b[AI]助手"
  chat-format: "<%npc_name%> %message%"

# 消息配置
messages:
  no-permission: "&c你没有权限执行此命令。"
  usage: "&e用法: /ask <问题>"
  thinking: "&e正在思考中，请稍候..."
  no-key: "&cAPI密钥未配置，请设置 config.yml 中的 api.key"
  error: "&c请求AI时出错: %error%"
  cooldown: "&c请等待 %seconds% 秒后再询问。"
  reloaded: "&a配置已重载。"
  broadcast-question: "&6[提问] &e%sender%&6: &f%question%"
  broadcast-answer: "&b[AI] %answer%"
  npc-say-format: "%message%"

# 冷却时间 (秒)
cooldown: 5
