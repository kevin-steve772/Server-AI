name: Server-AI
version: 1.0.5
main: com.serverai.Main
api-version: 1.21
folia-supported: true
depend: [Citizens]

commands:
  ask:
    description: 询问AI问题（公开广播）
    usage: /ask <问题>
    aliases: [ai, 问]
    permission: serverai.ask
  npc:
    description: 管理AI聊天NPC
    usage: /npc spawn|remove|say|move|come|stop|info
    permission: serverai.npc

permissions:
  serverai.ask:
    description: 允许使用/ask命令
    default: true
  serverai.reload:
    description: 允许重载配置
    default: op
  serverai.npc:
    description: 允许管理AI NPC
    default: op
