# AI API 配置
api:
  key: "your-api-key-here"
  # 优先读取此环境变量，避免将密钥明文写入配置文件
  key-env: "SERVER_AI_API_KEY"
  # 本地无鉴权的 OpenAI 兼容服务可设为 false
  require-key: true
  endpoint: "https://api.openai.com/v1"
  model: "gpt-3.5-turbo"
  max-tokens: 1024
  temperature: 0.7
  timeout: 30
  max-concurrent-requests: 4
  max-question-length: 1000
  system-prompt: >-
    You are an AI assistant inside a Minecraft server. Use the available NPC tools
    whenever the requester asks the NPC to move, come to a player, stop, speak, or
    report its location. Do not claim a tool succeeded unless its result says so.

# NPC 配置 (使用 Citizens 玩家型 NPC)
npc:
  name: "&b[AI]助手"
  chat-format: "<%npc_name%> %message%"
  default-speed: 1.0
  arrival-distance: 1.5
  max-move-distance: 512.0
  skin: ""  # 玩家名用于获取皮肤，留空使用默认皮肤

# 消息配置
messages:
  no-permission: "&c你没有权限执行此命令。"
  usage: "&e用法: /ask <问题>"
  thinking: "&e正在思考中，请稍候..."
  no-key: "&cAPI密钥未配置，请设置 config.yml 中的 api.key"
  error: "&c请求AI时出错: %error%"
  cooldown: "&c请等待 %seconds% 秒后再询问。"
  in-progress: "&c你已有一个请求正在处理中，请等待完成。"
  question-too-long: "&c问题过长，最多允许 %max% 个字符。"
  reloaded: "&a配置已重载。"
  reload-error: "&c配置重载失败: %error%"
  broadcast-question: "&6[提问] &e%sender%&6: &f%question%"
  broadcast-answer: "&b[AI] %answer%"
  npc-say-format: "%message%"
  npc-not-spawned: "&c请先生成 NPC。"

# 冷却时间 (秒)
cooldown: 5
